<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인생역전 로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 테마 버튼 -->
    <button id="theme-toggle">다크 모드</button>

    <div class="container">
        <header>
            <h1>로또 번호 생성기</h1>
        </header>
        
        <main>
            <section class="generator-section">
                <p>아래 버튼을 누르면 행운의 번호 5세트를 뽑아드립니다!</p>
                <button id="generate-btn" class="btn-primary">행운의 번호 뽑기</button>
                <div id="result-area" class="result-area"></div>
            </section>

            <hr class="divider">

            <!-- 제휴 문의 폼 -->
            <section class="contact-section">
                <h2>제휴 및 문의</h2>
                <form action="https://formspree.io/f/meervaoa" method="POST" class="contact-form">
                    <div class="form-group">
                        <label for="name">성함/업체명</label>
                        <input type="text" id="name" name="name" required placeholder="이름을 입력하세요">
                    </div>
                    <div class="form-group">
                        <label for="email">이메일 주소</label>
                        <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
                    </div>
                    <div class="form-group">
                        <label for="message">문의 내용</label>
                        <textarea id="message" name="message" rows="4" required placeholder="제휴 관련 내용을 적어주세요"></textarea>
                    </div>
                    <button type="submit" class="btn-submit">문의 보내기</button>
                </form>
            </section>

            <hr class="divider">

            <!-- Disqus 댓글 영역 -->
            <section class="comment-section">
                <h2>댓글</h2>
                <div id="disqus_thread"></div>
                <script>
                    /**
                    *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                    *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                    /*
                    var disqus_config = function () {
                    this.page.url = window.location.href;  // Replace PAGE_URL with your page's canonical URL variable
                    this.page.identifier = window.location.pathname; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                    };
                    */
                    (function() { // DON'T EDIT BELOW THIS LINE
                    var d = document, s = d.createElement('script');
                    s.src = 'https://lotto-generator-1.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                    })();
                </script>
                <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
            </section>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
