<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인생역전 로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google AdSense Auto Ads Script Placeholder -->
    <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script> -->
</head>
<body>
    <!-- 테마 버튼 -->
    <button id="theme-toggle">다크 모드</button>

    <div class="container">
        <header>
            <h1>로또 번호 생성기</h1>
        </header>

        <!-- 상단 광고 영역 -->
        <div class="adsense-container ads-top">
            <p style="font-size: 10px; color: #999; margin: 0;">ADVERTISEMENT</p>
            <!-- <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-..." data-ad-slot="..." data-ad-format="auto" data-full-width-responsive="true"></ins> -->
            <!-- <script>(adsbygoogle = window.adsbygoogle || []).push({});</script> -->
        </div>
        
        <main>
            <section class="generator-section">
                <p>아래 버튼을 누르면 행운의 번호 5세트를 뽑아드립니다!</p>
                <button id="generate-btn" class="btn-primary">행운의 번호 뽑기</button>
                <div id="result-area" class="result-area"></div>
            </section>

            <!-- 중간 광고 영역 (로또 번호 아래) -->
            <div class="adsense-container ads-middle">
                <!-- <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-..." data-ad-slot="..." data-ad-format="auto" data-full-width-responsive="true"></ins> -->
                <!-- <script>(adsbygoogle = window.adsbygoogle || []).push({});</script> -->
            </div>

            <hr class="divider">

            <!-- 제휴 문의 폼 -->
            <section class="contact-section">
                <h2>제휴 및 문의</h2>
                <form action="https://formspree.io/f/meervaoa" method="POST" class="contact-form">
                    <div class="form-group">
                        <label for="name">성함/업체명</label>
                        <input type="text" id="name" name="name" required placeholder="이름을 입력하세요">
                    </div>
                    <div class="form-group">
                        <label for="email">이메일 주소</label>
                        <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
                    </div>
                    <div class="form-group">
                        <label for="message">문의 내용</label>
                        <textarea id="message" name="message" rows="4" required placeholder="제휴 관련 내용을 적어주세요"></textarea>
                    </div>
                    <button type="submit" class="btn-submit">문의 보내기</button>
                </form>
            </section>

            <hr class="divider">

            <!-- Disqus 댓글 영역 -->
            <section class="comment-section">
                <h2>댓글</h2>
                <div id="disqus_thread"></div>
                <script>
                    (function() {
                    var d = document, s = d.createElement('script');
                    s.src = 'https://prj-1.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                    })();
                </script>
            </section>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
